replicaCount: 1
image:
  repository: ghcr.io/yagami-escobar/web-bcodex-react-app1
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 128m
    memory: 128Mi
  limits:
    cpu: 256m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  cpuUtilizationPercentage: 70
  memoryUtilizationPercentage: 70